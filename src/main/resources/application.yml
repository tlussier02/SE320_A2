spring:
  application:
    name: digital-therapy-assistant
  datasource:
    url: jdbc:h2:file:./data/dta-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    root: INFO
    com.dta: DEBUG

app:
  security:
    jwt:
      secret: ZmFrZS1qd3Qtc2VjcmV0LWZvci1sb2NhbC1kZXZlbG9wbWVudC1vbmx5LXNob3VsZC1iZS1vdmVycmlkZGVu
      access-token-expiration: 3600000
      refresh-token-expiration: 1209600000
